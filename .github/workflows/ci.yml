name: CI/CD Pipeline

on:
  # Activar el workflow en push a la rama main
  push:
    branches:
      - main
  # Activar el workflow en pull requests a la rama main
  pull_request:
    branches:
      - main

# Variables de entorno globales
env:
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/flask-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Etapa 1: Construir la imagen Docker
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          outputs: type=docker,dest=/tmp/image.tar
      
      - name: Upload Docker image
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: /tmp/image.tar
  
  # Etapa 2: Ejecutar pruebas dentro del contenedor
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image for testing
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
      
      - name: Run pytest en el contenedor
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:test .
          docker run --rm ${{ env.IMAGE_NAME }}:test pip install pytest pytest-cov
          docker run --rm ${{ env.IMAGE_NAME }}:test pytest test_app.py -v --cov=. --cov-report=term-missing
  
  # Etapa 3: Push de la imagen a Docker Hub
  push:
    runs-on: ubuntu-latest
    needs: test
    # Solo hacer push en eventos de push a main, no en pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
      
      - name: Image pushed successfully
        run: echo "✅ Imagen enviada a Docker Hub: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
